{{ define "main" }}
<div class="main-page-container">
    <header class="main-page-header">
        <h1 class="main-page-title">{{ .Title }}</h1>
        {{ if .Content }}
        <div class="main-page-intro">
            {{ .Content }}
        </div>
        {{ end }}
    </header>

    <div class="blog-grid">
        {{ range .Pages }}
        <article class="project-card blog-card">
            <div class="project-header">
                <h2 class="project-title">
                    <a href="{{ .Permalink }}">{{ .Title }}</a>
                </h2>
            </div>
            <div class="project-meta blog-post-meta">
                {{ if .Lastmod }}
                <div class="project-date blog-post-date">{{ .Lastmod | time.Format ":date_medium" }}</div>
                {{ end }}
                <div class="blog-read-time">{{ .ReadingTime }} min read</div>
            </div>
        </article>
        {{ end }}
    </div>
</div>
{{ end }}
